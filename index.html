<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invitation – Asep & Ai Siti</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== COVER ===== -->
  <section id="cover">

    <!-- Background foto prewed -->
    <div class="cover-bg"></div>
    <div class="cover-overlay"></div>

    <!-- Label kiri atas -->
    <div class="cover-top-label">
      <span class="welcome-text">Welcome to</span>
      <span class="wedding-of">The Wedding of</span>
    </div>

    <!-- Konten bawah -->
    <div class="cover-bottom">

      <!-- Nama pasangan -->
      <div class="couple-names">
        <div class="name-block">
          <span class="name-full">Asep Ilyas</span>
          <span class="name-nick">— Adul —</span>
        </div>

        <div class="names-divider">&amp;</div>

        <div class="name-block">
          <span class="name-full">Ai Siti</span>
          <span class="name-nick">— Cui —</span>
        </div>
      </div>

      <!-- Tanggal -->
      <div class="cover-date">
        <div class="date-line"></div>
        <span class="date-text">07 Juni 2026</span>
        <div class="date-line right"></div>
      </div>

      <!-- Kepada tamu -->
      <p class="cover-kepada">Kepada Yth.</p>
      <p class="cover-tamu" id="guest-name">Tamu Undangan</p>

      <!-- Tombol -->
      <button class="btn-open" id="btn-open">
        <span>Buka Undangan</span>
        <span class="btn-icon">→</span>
      </button>

    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
